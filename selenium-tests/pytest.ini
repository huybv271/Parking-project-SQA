[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbose output
addopts = 
    -v
    --tb=short
    --strict-markers
    --capture=no
    --html=reports/selenium_report.html
    --self-contained-html

# Markers for test categorization
markers =
    auth: Authentication tests
    checkin: Check-in/ticket creation tests
    checkout: Check-out tests
    camera: Tests requiring camera access (skipped by default)
    skip: Tests that are skipped with reason
    CI_FUN_01: Check-in success with valid motorbike plate
    CI_FUN_02: Check-in reject duplicate vehicle
    CI_FUN_03: Check-in reject invalid plate format
    CI_FUN_04: Check-in no plate detected
    CI_FUN_05: Check-in car long plate
    CI_FUN_06: Check-in government vehicle blue plate
    CI_FUN_07: Check-in red plate
    CI_FUN_08: Check-in slot full
    CI_FUN_09: Check-in multiple vehicles sequential
    CO_FUN_01: Check-out success motorbike plate
    CO_FUN_02: Check-out reject no active session
    CO_FUN_03: Check-out reject invalid plate format
    CO_FUN_04: Check-out no plate detected
    CO_FUN_05: Check-out car long plate
    CO_FUN_06: Check-out government vehicle blue plate
    CO_FUN_07: Check-out red plate
    CO_FUN_08: Check-out prevent duplicate
    CO_FUN_09: Check-out multiple vehicles sequential
