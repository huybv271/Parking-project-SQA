[pytest]
testpaths = tests
addopts = -ra -v --strict-markers --html=reports/report.html --self-contained-html
markers =
    gui: UI layout and visual sanity checks
    validation: field validation tests
    booking: reservation search/select/reserve flow tests
    history: reservation history tests
    delete_spot: admin delete/restore spot tests
    admin_management: parking rate, staff list, deleted staff, and create staff tests
    admin: admin UI tests
    smoke: minimal happy path checks
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S
